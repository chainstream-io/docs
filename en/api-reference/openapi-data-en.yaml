  /v2/kyt/transfers/{transferId}/summary:
    get:
      tags:
        - KYT
      summary: KYT - Get Transfer Summary
      description: Retrieve summary information for a registered transfer
      operationId: get.transfer.summary
      parameters:
        - name: transferId
          in: path
