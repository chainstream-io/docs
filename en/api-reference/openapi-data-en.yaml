            - kyt.write
        - api_key_auth: []
  /v2/kyt/transfers/{transferId}/alerts:
    get:
      tags:
        - KYT
      summary: KYT - Get Transfer Alerts
      description: Retrieve alerts associated with a transfer
      operationId: get.transfer.alerts
      parameters:
        - name: transferId
          in: path
          description: Transfer ID
          required: true
          schema:
            type: string
          example: 4b922c3a-93bc-3d44-b261-0867e5859d57
      responses:
        '200':
          description: ''
          content:
