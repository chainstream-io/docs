                      type:
                        - string
                        - 'null'
                      description: Total holdings of bundle wallets
                      example: '18000'
                    circulatingSupply:
                      type:
                        - string
                        - 'null'
                      description: Circulating supply of the token
                      example: '900000'
                    completionRatio:
                      type:
                        - string
                        - 'null'
                      description: Bonding curve completion ratio
                      example: '1.0'
                    devHoldingsRatio:
                      type:
                        - string
                        - 'null'
