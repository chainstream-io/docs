components:
  schemas:
    ActivityType:
      type: string
      description: Activity type (extends TradeType)
      enum:
        - BUY
        - SELL
        - LIQUIDITY_INITIALIZE
        - LIQUIDITY_ADD
        - LIQUIDITY_REMOVE
        - RED_PACKET_CREATE
        - RED_PACKET_CLAIM
        - RED_PACKET_COMPLETE
        - RED_PACKET_REFUND
    BalanceChangeType:
      type: string
      description: Balance change type
      enum:
        - INCREASE
        - DECREASE
    BalanceTokenType:
      type: string
      description: Balance token type
      enum:
        - SOL
        - SPL
    BalanceUpdate:
      type: object
      description: Balance update record
      required:
        - blockHash
        - blockHeight
        - blockTimestamp
        - transactionSignature
        - index
        - tokenAddress
        - tokenAccountAddress
        - accountOwnerAddress
        - preBalance
        - preBalanceInNative
        - preBalanceInUsd
        - postBalance
        - postBalanceInNative
        - postBalanceInUsd
        - balanceChange
        - balanceChangeInNative
        - balanceChangeInUsd
        - type
        - changeType
      properties:
        accountOwnerAddress:
          type: string
          description: Account owner wallet address
        balanceChange:
          type: string
          description: Balance change amount
        balanceChangeInNative:
          type: string
          description: Balance change in native token
        balanceChangeInUsd:
          type: string
          description: Balance change in USD
        blockHash:
          type: string
          description: Block hash
        blockHeight:
          type: integer
          format: int64
          description: Block height
        blockSlot:
          type:
            - integer
            - 'null'
          format: int64
          description: Block slot number
        blockTimestamp:
          type: integer
          format: int64
          description: Block timestamp (milliseconds)
        changeType:
          $ref: '#/components/schemas/BalanceChangeType'
          description: Balance change direction (INCREASE or DECREASE)
        index:
          type: integer
          format: int64
          description: Transaction instruction index
        postBalance:
          type: string
          description: Balance after the transaction
        postBalanceInNative:
          type: string
          description: Balance after in native token
        postBalanceInUsd:
          type: string
          description: Balance after in USD
        preBalance:
          type: string
          description: Balance before the transaction
        preBalanceInNative:
          type: string
          description: Balance before in native token
        preBalanceInUsd:
          type: string
          description: Balance before in USD
        tokenAccountAddress:
          type: string
          description: Token account address
        tokenAddress:
          type: string
          description: Token contract address
        transactionSignature:
          type: string
          description: Transaction signature
        type:
          $ref: '#/components/schemas/BalanceTokenType'
          description: Token type (SOL for native, SPL for tokens)
    Blockchain:
      type: object
      description: Blockchain information
      required:
        - symbol
        - name
        - explorerUrl
        - chainId
      properties:
        chainId:
          type: integer
          format: int64
          description: Blockchain chain ID
          example: 1
        explorerUrl:
          type: string
          description: Blockchain explorer URL
          example: https://explorer.solana.com
        name:
          type: string
          description: Blockchain display name
          example: Solana
        symbol:
          type: string
          description: Blockchain ticker symbol
          example: SOL
    BlockchainLatestBlock:
      type: object
      required:
        - blockhash
        - lastValidBlockHeight
      properties:
        blockhash:
          type: string
          description: Latest block hash
          example: '123'
        lastValidBlockHeight:
          type: integer
          format: int64
          description: Last valid block height
          example: 123
    BooleanResult:
      type: object
      description: Boolean result response
      required:
        - result
      properties:
        result:
          type: boolean
          description: Boolean result value
          example: true
    CalculatePnlInput:
      type: object
      properties:
        tokenAddresses:
          type:
            - array
            - 'null'
          items:
            type: string
          description: List of token addresses to calculate PnL for
          example:
            - 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
            - So11111111111111111111111111111111111111112
    ChainSymbol:
      type: string
      description: Supported blockchain chains
      enum:
        - sol
        - eth
        - bsc
    ClaimRedPacketRequest:
      type: object
      description: Claimer wallet address
      required:
        - claimer
      properties:
        claimer:
          type: string
          description: Claimer wallet address
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        packetId:
          type:
            - string
            - 'null'
          description: Red packet on-chain ID
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: Red packet password for claiming
          example: '123456'
        shareId:
          type:
            - string
            - 'null'
          description: Share identifier
          example: abc123
    ClaimRedPacketResponse:
      type: object
      description: Claim red packet response
      required:
        - txSerialize
      properties:
        txSerialize:
          type: string
          description: Serialized transaction data
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateRedPacketRequest:
      type: object
      description: Creator wallet address
      required:
        - creator
        - mint
        - maxClaims
      properties:
        claimAuthority:
          type:
            - string
            - 'null'
          description: Claim authority address
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        creator:
          type: string
          description: Creator wallet address
          example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        expiration:
          type:
            - integer
            - 'null'
          format: int64
          description: Expiration duration in seconds
          example: 24
        fixedAmount:
          type:
            - string
            - 'null'
          description: Fixed amount per claim
          example: '1000000000'
        maxClaims:
          type: integer
          format: int32
          description: Maximum number of claims allowed
          example: 10
        memo:
          type:
            - string
            - 'null'
          description: Red packet memo message
          example: Happy Red Packet
        mint:
          type: string
          description: Token mint address
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: Red packet password for claiming
          example: '123456'
        totalAmount:
          type:
            - string
            - 'null'
          description: Total amount in the red packet
          example: '1000000000'
    CreateRedPacketResponse:
      type: object
      description: Create red packet response
      required:
        - txSerialize
        - shareId
      properties:
        shareId:
          type: string
          description: Share identifier
          example: abc123
        txSerialize:
          type: string
          description: Serialized transaction data
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateWebhookRequest:
      type: object
      description: Request to create a webhook endpoint
      required:
        - url
      properties:
        channels:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/WebhookChannel'
          description: Webhook event channels to subscribe to
        description:
          type:
            - string
            - 'null'
          description: Endpoint description
          example: Webhook description
        disabled:
          type:
            - boolean
            - 'null'
          description: Whether the endpoint is disabled
          example: false
        filter:
          type:
            - string
            - 'null'
          description: Event filter configuration
        filterTypes:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Event type filters
        metadata:
          type:
            - object
            - 'null'
          description: Endpoint metadata
          additionalProperties: {}
          propertyNames:
            type: string
          example:
            key: value
        rateLimit:
          type:
            - integer
            - 'null'
          format: int32
          description: Rate limit for the endpoint
          example: 1000
          minimum: 0
        secret:
          type:
            - string
            - 'null'
          description: Endpoint signing secret
        url:
          type: string
          description: Webhook destination URL
          example: https://example.com
    DevToken:
      type: object
      description: Token info returned by `get_dev_tokens` — mirrors TS `DevTokenDTO`.
      required:
        - address
        - metadata
        - marketData
        - stats
      properties:
        address:
          type: string
          description: Token address
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
        marketData:
          $ref: '#/components/schemas/TokenMarketData'
          description: Market data
        metadata:
          $ref: '#/components/schemas/TokenMetadata'
          description: Token metadata
        stats:
          $ref: '#/components/schemas/TokenStats'
          description: Trade statistics
    Dex:
      type: object
      description: DEX information
      required:
        - chain
      properties:
        chain:
          type: string
          description: Chain identifier
          example: sol
        image:
          type:
            - string
            - 'null'
          description: DEX image URL
          example: https://example.com/dex-logo.png
        programAddress:
          type:
            - string
            - 'null'
          description: DEX program address
          example: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
        protocolFamily:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexProtocolFamily'
              description: Protocol family name
    DexPool:
      type: object
      description: DEX pool
      required:
        - poolAddress
        - chain
        - tokenAAddress
        - tokenBAddress
      properties:
        chain:
          type: string
          description: Chain
          example: sol
        poolAddress:
          type: string
          description: Pool address
          example: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
        programAddress:
          type:
            - string
