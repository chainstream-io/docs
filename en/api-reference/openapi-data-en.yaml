              schema:
                $ref: '#/components/schemas/KytAlertsResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/transfers/{transferId}/exposures/direct:
    get:
      tags:
        - KYT
      summary: KYT - Get Transfer Direct Exposure
      description: Get direct exposure information for a transfer
      operationId: get.transfer.direct.exposure
      parameters:
        - name: transferId
          in: path
          description: Transfer ID
          required: true
