components:
  schemas:
    ActivityType:
      type: string
      description: Activity type (extends TradeType)
      enum:
        - BUY
        - SELL
        - LIQUIDITY_INITIALIZE
        - LIQUIDITY_ADD
        - LIQUIDITY_REMOVE
        - RED_PACKET_CREATE
        - RED_PACKET_CLAIM
        - RED_PACKET_COMPLETE
        - RED_PACKET_REFUND
    BalanceChangeType:
      type: string
      description: Balance change type
      enum:
        - INCREASE
        - DECREASE
    BalanceTokenType:
      type: string
      description: Balance token type
      enum:
        - SOL
        - SPL
    BalanceUpdate:
      type: object
      description: Balance update record
      required:
        - blockHash
        - blockHeight
        - blockTimestamp
        - transactionSignature
        - index
        - tokenAddress
        - tokenAccountAddress
        - accountOwnerAddress
        - preBalance
        - preBalanceInNative
        - preBalanceInUsd
        - postBalance
        - postBalanceInNative
        - postBalanceInUsd
        - balanceChange
        - balanceChangeInNative
        - balanceChangeInUsd
        - type
        - changeType
      properties:
        accountOwnerAddress:
          type: string
          description: アカウント所有者のウォレットアドレス
        balanceChange:
          type: string
          description: 残高変動額
        balanceChangeInNative:
          type: string
          description: ネイティブトークン建ての残高変動額
        balanceChangeInUsd:
          type: string
          description: USD建ての残高変動額
        blockHash:
          type: string
          description: ブロックハッシュ
        blockHeight:
          type: integer
          format: int64
          description: ブロック高
        blockSlot:
          type:
            - integer
            - 'null'
          format: int64
          description: ブロックスロット番号
        blockTimestamp:
          type: integer
          format: int64
          description: ブロックタイムスタンプ（ミリ秒）
        changeType:
          $ref: '#/components/schemas/BalanceChangeType'
          description: 残高変動方向（INCREASE または DECREASE）
        index:
          type: integer
          format: int64
          description: トランザクションインストラクションインデックス
        postBalance:
          type: string
          description: トランザクション後の残高
        postBalanceInNative:
          type: string
          description: ネイティブトークン建てのトランザクション後残高
        postBalanceInUsd:
          type: string
          description: USD建てのトランザクション後残高
        preBalance:
          type: string
          description: トランザクション前の残高
        preBalanceInNative:
          type: string
          description: ネイティブトークン建てのトランザクション前残高
        preBalanceInUsd:
          type: string
          description: USD建てのトランザクション前残高
        tokenAccountAddress:
          type: string
          description: トークンアカウントアドレス
        tokenAddress:
          type: string
          description: トークンコントラクトアドレス
        transactionSignature:
          type: string
          description: トランザクション署名
        type:
          $ref: '#/components/schemas/BalanceTokenType'
          description: 'トークンタイプ（SOL: ネイティブ、SPL: トークン）'
    Blockchain:
      type: object
      description: Blockchain information
      required:
        - symbol
        - name
        - explorerUrl
        - chainId
      properties:
        chainId:
          type: integer
          format: int64
          description: ブロックチェーンのチェーン ID
          example: 1
        explorerUrl:
          type: string
          description: ブロックチェーンエクスプローラー URL
          example: https://explorer.solana.com
        name:
          type: string
          description: ブロックチェーンの表示名
          example: Solana
        symbol:
          type: string
          description: ブロックチェーンのティッカーシンボル
          example: SOL
    BlockchainLatestBlock:
      type: object
      required:
        - blockhash
        - lastValidBlockHeight
      properties:
        blockhash:
          type: string
          description: 最新ブロックのハッシュ
          example: '123'
        lastValidBlockHeight:
          type: integer
          format: int64
          description: 最終有効ブロック高
          example: 123
    BooleanResult:
      type: object
      description: Boolean result response
      required:
        - result
      properties:
        result:
          type: boolean
          description: ブール値の結果
          example: true
    CalculatePnlInput:
      type: object
      properties:
        tokenAddresses:
          type:
            - array
            - 'null'
          items:
            type: string
          description: PnL を計算するトークンアドレスのリスト
          example:
            - 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
            - So11111111111111111111111111111111111111112
    ChainSymbol:
      type: string
      description: Supported blockchain chains
      enum:
        - sol
        - eth
        - bsc
    ClaimRedPacketRequest:
      type: object
      description: 受取者のウォレットアドレス
      required:
        - claimer
      properties:
        claimer:
          type: string
          description: 受取者のウォレットアドレス
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        packetId:
          type:
            - string
            - 'null'
          description: レッドパケットのオンチェーン ID
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: 受取用のレッドパケットパスワード
          example: '123456'
        shareId:
          type:
            - string
            - 'null'
          description: 共有識別子
          example: abc123
    ClaimRedPacketResponse:
      type: object
      description: Claim red packet response
      required:
        - txSerialize
      properties:
        txSerialize:
          type: string
          description: シリアライズされたトランザクションデータ
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateRedPacketRequest:
      type: object
      description: 作成者のウォレットアドレス
      required:
        - creator
        - mint
        - maxClaims
      properties:
        claimAuthority:
          type:
            - string
            - 'null'
          description: 受取権限アドレス
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        creator:
          type: string
          description: 作成者のウォレットアドレス
          example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        expiration:
          type:
            - integer
            - 'null'
          format: int64
          description: 有効期限（秒）
          example: 24
        fixedAmount:
          type:
            - string
            - 'null'
          description: 1回あたりの固定受取金額
          example: '1000000000'
        maxClaims:
          type: integer
          format: int32
          description: 最大受取可能回数
          example: 10
        memo:
          type:
            - string
            - 'null'
          description: レッドパケットのメモメッセージ
          example: Happy Red Packet
        mint:
          type: string
          description: トークンミントアドレス
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: 受取用のレッドパケットパスワード
          example: '123456'
        totalAmount:
          type:
            - string
            - 'null'
          description: レッドパケットの合計金額
          example: '1000000000'
    CreateRedPacketResponse:
      type: object
      description: Create red packet response
      required:
        - txSerialize
        - shareId
      properties:
        shareId:
          type: string
          description: 共有識別子
          example: abc123
        txSerialize:
          type: string
          description: シリアライズされたトランザクションデータ
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateWebhookRequest:
      type: object
      description: Request to create a webhook endpoint
      required:
        - url
      properties:
        channels:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/WebhookChannel'
          description: 購読する Webhook イベントチャネル
        description:
          type:
            - string
            - 'null'
          description: エンドポイントの説明
          example: Webhook description
        disabled:
          type:
            - boolean
            - 'null'
          description: エンドポイントが無効かどうか
          example: false
        filter:
          type:
            - string
            - 'null'
          description: イベントフィルタ設定
        filterTypes:
          type:
            - array
            - 'null'
          items:
            type: string
          description: イベントタイプフィルタ
        metadata:
          type:
            - object
            - 'null'
          description: エンドポイントメタデータ
          additionalProperties: {}
          propertyNames:
            type: string
          example:
            key: value
        rateLimit:
          type:
            - integer
            - 'null'
          format: int32
          description: エンドポイントのレート制限
          example: 1000
          minimum: 0
        secret:
          type:
            - string
            - 'null'
          description: エンドポイント署名シークレット
        url:
          type: string
          description: Webhook 送信先 URL
          example: https://example.com
    DevToken:
      type: object
      description: Token info returned by `get_dev_tokens` — mirrors TS `DevTokenDTO`.
      required:
        - address
        - metadata
        - marketData
        - stats
      properties:
        address:
          type: string
          description: Token address
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
        marketData:
          $ref: '#/components/schemas/TokenMarketData'
          description: Market data
        metadata:
          $ref: '#/components/schemas/TokenMetadata'
          description: Token metadata
        stats:
          $ref: '#/components/schemas/TokenStats'
          description: Trade statistics
    Dex:
      type: object
      description: DEX information
      required:
        - chain
      properties:
        chain:
          type: string
          description: Chain identifier
          example: sol
        image:
          type:
            - string
            - 'null'
          description: DEX image URL
          example: https://example.com/dex-logo.png
        programAddress:
          type:
            - string
            - 'null'
          description: DEX program address
          example: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
        protocolFamily:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexProtocolFamily'
              description: Protocol family name
    DexPool:
      type: object
      description: DEX pool
      required:
        - poolAddress
