openapi: 3.1.0
info:
  title: Data Services API
  description: Data Services API
  contact:
    name: AI
    email: ai@sx.ai
  license:
    name: MIT
  version: '1.0'
servers:
  - url: https://api.chainstream.io
    description: Production
paths:
  /v2/blockchain:
    get:
      tags:
        - Blockchain
      summary: ブロックチェーン - 一覧
      description: サポートされているブロックチェーンのリストを取得
      operationId: get.supported.blockchains
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blockchain'
  /v2/blockchain/{chain}/latest_block:
    get:
      tags:
        - Blockchain
      summary: ブロックチェーン - 最新ブロック
      description: 特定のブロックチェーンの最新ブロック情報を取得
      operationId: get.latest.block
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockchainLatestBlock'
  /v2/dex:
    get:
      tags:
        - Dex
      summary: Dex - 一覧
      description: 指定されたブロックチェーン上のすべての DEX の情報を取得
      operationId: list.dex
      parameters:
        - name: cursor
          in: query
          description: ページネーションカーソル
          required: false
          schema:
            type: string
          example: eyJpZCI6IjEyMyJ9
        - name: limit
          in: query
          description: ページあたりの結果数
          required: false
          schema:
            type: integer
            format: int64
            default: 20
          example: 20
        - name: direction
          in: query
          description: ページネーション方向（next または prev）
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/PageDirection'
            default: next
          example: next
        - name: chains
          in: query
          description: ブロックチェーンネットワークでフィルタ
          required: false
          schema:
            type: array
            items:
              type: string
          example: sol
        - name: dexProgram
          in: query
          description: DEX プログラムアドレスでフィルタ
          required: false
          schema:
            type: string
          example: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_Dex'
  /v2/dexpools/{chain}/{poolAddress}:
    get:
      tags:
        - DexPool
      summary: DEX プール - 詳細
      description: 特定の DEX プールの詳細情報を取得
      operationId: get.dexpool
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: poolAddress
          in: path
          description: プールアドレス
          required: true
          schema:
            type: string
          example: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                oneOf:
                  - type: 'null'
                  - $ref: '#/components/schemas/DexPoolDetail'
              example:
                chain: sol
                createdBlockTimestamp: 2024-01-15T10:30:00Z
                feeRate: '0.003'
                image: https://ipfs.io/ipfs/bafkreid7667676767676767676767676767676767676767676767676767676767676767
                liquidityModel: 1
                poolAddress: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
                programAddress: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
                protocolFamily: OrcaWhirpool
                protocolName: OrcaWhirpool AMM V2
                tickSpacing: 64
                tokenAAddress: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
                tokenALiquidity:
                  amountInNative: '5000.123'
                  amountInUsd: '1000000.45'
                  decimals: 6
                  priceNative: '0.005'
                  priceUsd: '1.0001'
                  tokenAddress: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
                  vaultAmount: '1000000000000'
                tokenBAddress: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
                tokenBLiquidity:
                  amountInNative: '5000.123'
                  amountInUsd: '1000000.45'
                  decimals: 6
                  priceNative: '0.005'
                  priceUsd: '1.0001'
                  tokenAddress: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
                  vaultAmount: '1000000000000'
                tokenCount: 2
                tvlInSol: '1000000.45'
                tvlInUsd: '1000000.45'
                type: 1
                version: 2
  /v2/dexpools/{chain}/{poolAddress}/snapshots:
    get:
      tags:
        - DexPool
      summary: DEX プール - 流動性スナップショット
      description: 特定のプールの過去の流動性スナップショットを取得。時間パラメータが指定された場合、その時刻以前の最も近いスナップショットを返します
      operationId: get.dexpool.snapshots
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: poolAddress
          in: path
          description: プールアドレス
          required: true
          schema:
            type: string
          example: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
        - name: cursor
          in: query
          description: ページネーションカーソル
          required: false
          schema:
            type: string
          example: eyJpZCI6IjEyMyJ9
        - name: limit
          in: query
          description: ページあたりの結果数
          required: false
          schema:
            type: integer
            format: int64
            default: 20
          example: 20
        - name: direction
          in: query
          description: ページネーション方向（next または prev）
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/PageDirection'
            default: next
          example: next
        - name: time
          in: query
          description: スナップショット検索対象の Unix タイムスタンプ
          required: false
          schema:
            type: integer
            format: int64
          example: 1705312800000
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_DexPoolSnapshot'
  /v2/ipfs/presign:
    post:
      tags:
        - IPFS
      summary: IPFS - 署名付き URL
      description: IPFS コンテンツ用の署名付き URL を作成
      operationId: presign
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignResponse'
  /v2/kyt/address:
    post:
      tags:
        - KYT
      summary: KYT - アドレス登録
      description: KYT モニタリング用にアドレスを登録
      operationId: register.address
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KYTRegisterAddressInput'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytRegisterAddressResponse'
      security:
        - bearer_auth:
            - kyt.write
        - api_key_auth: []
  /v2/kyt/addresses/{address}/risk:
    get:
      tags:
        - KYT
      summary: KYT - アドレスリスク取得
      description: 登録済みアドレスのリスク評価を取得
      operationId: get.address.risk
      parameters:
        - name: address
          in: path
          description: アドレス
          required: true
          schema:
            type: string
          example: 1.2638660031056791e+45
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytAddressRiskResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/transfer:
    post:
      tags:
        - KYT
      summary: KYT - 送金登録
      description: KYT（Know Your Transaction）分析用に送金を登録
      operationId: register.transfer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KYTRegisterTransferInput'
        required: true
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytTransferBaseResponse'
      security:
        - bearer_auth:
            - kyt.write
        - api_key_auth: []
  /v2/kyt/transfers/{transferId}/alerts:
    get:
      tags:
        - KYT
      summary: KYT - 送金アラート取得
      description: 送金に関連するアラートを取得
      operationId: get.transfer.alerts
      parameters:
        - name: transferId
          in: path
          description: 送金 ID
          required: true
          schema:
            type: string
          example: 4b922c3a-93bc-3d44-b261-0867e5859d57
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytAlertsResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/transfers/{transferId}/exposures/direct:
    get:
      tags:
        - KYT
      summary: KYT - 送金ダイレクトエクスポージャー取得
      description: 送金のダイレクトエクスポージャー情報を取得
      operationId: get.transfer.direct.exposure
      parameters:
        - name: transferId
          in: path
          description: 送金 ID
          required: true
          schema:
            type: string
          example: 4b922c3a-93bc-3d44-b261-0867e5859d57
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytDirectExposureResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/transfers/{transferId}/network-identifications:
    get:
      tags:
        - KYT
      summary: KYT - 送金ネットワーク識別取得
      description: 送金のネットワーク識別情報を取得
      operationId: get.transfer.network.identifications
      parameters:
        - name: transferId
          in: path
          description: 送金 ID
          required: true
          schema:
            type: string
          example: 4b922c3a-93bc-3d44-b261-0867e5859d57
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytNetworkIdentificationsResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/transfers/{transferId}/summary:
    get:
      tags:
        - KYT
      summary: KYT - 送金サマリー取得
      description: 登録済み送金のサマリー情報を取得
      operationId: get.transfer.summary
      parameters:
        - name: transferId
          in: path
          description: 送金 ID
          required: true
          schema:
            type: string
          example: 4b922c3a-93bc-3d44-b261-0867e5859d57
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytTransferBaseResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/withdrawal:
    post:
      tags:
        - KYT
      summary: KYT - 出金登録
      description: KYT（Know Your Transaction）分析用に出金を登録
      operationId: register.withdrawal
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KYTRegisterWithdrawalInput'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytWithdrawalBaseResponse'
      security:
        - bearer_auth:
            - kyt.write
        - api_key_auth: []
  /v2/kyt/withdrawal/{withdrawalId}/address-identifications:
    get:
      tags:
        - KYT
      summary: KYT - 出金アドレス識別取得
      description: 出金のアドレス識別情報を取得
      operationId: get.withdrawal.address.identifications
      parameters:
        - name: withdrawalId
          in: path
          description: 出金 ID
          required: true
          schema:
            type: string
          example: 78666aa8-23e1-31d2-be25-d72cd7613eba
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytWithdrawalAddressIdentificationsResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/withdrawal/{withdrawalId}/alerts:
    get:
      tags:
        - KYT
      summary: KYT - 出金アラート取得
      description: 出金に関連するアラートを取得
      operationId: get.withdrawal.alerts
      parameters:
        - name: withdrawalId
          in: path
          description: 出金 ID
          required: true
          schema:
            type: string
          example: 78666aa8-23e1-31d2-be25-d72cd7613eba
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytAlertsResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/withdrawal/{withdrawalId}/exposures/direct:
    get:
      tags:
        - KYT
      summary: KYT - 出金ダイレクトエクスポージャー取得
      description: 出金のダイレクトエクスポージャー情報を取得
      operationId: get.withdrawal.direct.exposure
      parameters:
        - name: withdrawalId
          in: path
          description: 出金 ID
          required: true
          schema:
            type: string
          example: 78666aa8-23e1-31d2-be25-d72cd7613eba
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytDirectExposureResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/withdrawal/{withdrawalId}/fraud-assessment:
    get:
      tags:
        - KYT
      summary: KYT - 出金不正評価取得
      description: 出金の不正評価結果を取得
      operationId: get.withdrawal.fraud.assessment
      parameters:
        - name: withdrawalId
          in: path
          description: 出金 ID
          required: true
          schema:
            type: string
          example: 78666aa8-23e1-31d2-be25-d72cd7613eba
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytFraudAssessmentResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/withdrawal/{withdrawalId}/network-identifications:
    get:
      tags:
        - KYT
      summary: KYT - 出金ネットワーク識別取得
      description: 出金のネットワーク識別情報を取得
      operationId: get.withdrawal.network.identifications
      parameters:
        - name: withdrawalId
          in: path
          description: 出金 ID
          required: true
          schema:
            type: string
          example: 78666aa8-23e1-31d2-be25-d72cd7613eba
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytNetworkIdentificationsResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/kyt/withdrawal/{withdrawalId}/summary:
    get:
      tags:
        - KYT
      summary: KYT - 出金サマリー取得
      description: 登録済み出金のサマリー情報を取得
      operationId: get.withdrawal.summary
      parameters:
        - name: withdrawalId
          in: path
          description: 出金 ID
          required: true
          schema:
            type: string
          example: 78666aa8-23e1-31d2-be25-d72cd7613eba
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KytWithdrawalBaseResponse'
      security:
        - bearer_auth:
            - kyt.read
        - api_key_auth: []
  /v2/ranking/{chain}/finalStretch:
    get:
      tags:
        - Ranking
      summary: ランキング - ファイナルストレッチトークン
      description: ファイナルストレッチトークンを返す
      operationId: get.finalStretch.tokens
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: sortBy
          in: query
          description: ソートフィールド
          required: false
          schema:
            $ref: '#/components/schemas/TokenField'
          example: marketData.marketCapInUsd
        - name: sortDirection
          in: query
          description: ソート方向
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/SortDirection'
            default: desc
          example: desc
        - name: tag
          in: query
          description: ランキングタグフィルタ
          required: false
          schema:
            $ref: '#/components/schemas/RankingTag'
          example: pump_fun
        - name: rangeFilters
          in: query
          description: フィルタフィールド
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RangeFilterCondition'
          example:
            - field: marketData.marketCapInUsd
              min: '50000'
        - name: filters
          in: query
          description: フィルタ
          required: false
          schema:
            type: array
            items:
              type: string
          example: has_social_media
        - name: launchpadPlatform
          in: query
          description: ローンチパッドプラットフォーム
          required: false
          schema:
            type: array
            items:
              type: string
          example: raydium_launchpad
        - name: searchKeywords
          in: query
          description: 検索キーワード
          required: false
          schema:
            type: array
            items:
              type: string
          example: trump
        - name: excludeKeywords
          in: query
          description: 除外キーワード
          required: false
          schema:
            type: array
            items:
              type: string
          example: scam
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Token'
  /v2/ranking/{chain}/hotTokens/{duration}:
    get:
      tags:
        - Ranking
      summary: ランキング - 注目トークン
      description: トレンドトークンのリストを取得
      operationId: get.hot.tokens
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: duration
          in: path
          description: ランキングの期間
          required: true
          schema:
            $ref: '#/components/schemas/RankingDuration'
          example: 24h
        - name: sortBy
          in: query
          description: ソートフィールド
          required: false
          schema:
            $ref: '#/components/schemas/TokenField'
          example: marketData.marketCapInUsd
        - name: sortDirection
          in: query
          description: ソート方向
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/SortDirection'
            default: desc
          example: desc
        - name: tag
          in: query
          description: ランキングタグフィルタ
          required: false
          schema:
            $ref: '#/components/schemas/RankingTag'
          example: pump_fun
        - name: rangeFilters
          in: query
          description: フィルタフィールド
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RangeFilterCondition'
          example:
            - field: marketData.marketCapInUsd
              min: '50000'
        - name: filters
          in: query
          description: フィルタ
          required: false
          schema:
            type: array
            items:
              type: string
          example: has_social_media
        - name: launchpadPlatform
          in: query
          description: ローンチパッドプラットフォーム
          required: false
          schema:
            type: array
            items:
              type: string
          example: raydium_launchpad
        - name: searchKeywords
          in: query
          description: 検索キーワード
          required: false
          schema:
            type: array
            items:
              type: string
          example: trump
        - name: excludeKeywords
          in: query
          description: 除外キーワード
          required: false
          schema:
            type: array
            items:
              type: string
          example: scam
      responses:
        '200':
          description: 成功レスポンス
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Token'
  /v2/ranking/{chain}/migrated:
    get:
      tags:
        - Ranking
      summary: ランキング - 移行済みトークン
      description: 移行済みトークンを返す
      operationId: get.migrated.tokens
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: sortBy
          in: query
          description: ソートフィールド
          required: false
          schema:
            $ref: '#/components/schemas/TokenField'
          example: marketData.marketCapInUsd
        - name: sortDirection
          in: query
          description: ソート方向
          required: false
          schema:
            oneOf:
              - $ref: '#/components/schemas/SortDirection'
            default: desc
          example: desc
        - name: tag
          in: query
          description: ランキングタグフィルタ
          required: false
          schema:
            $ref: '#/components/schemas/RankingTag'
          example: pump_fun
        - name: rangeFilters
