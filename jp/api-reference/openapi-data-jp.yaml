  /v2/token/{chain}/marketData/multi:
    get:
      tags:
        - Token
      summary: トークン - マーケットデータ（複数）
      description: 複数トークンのマーケットデータを取得
      operationId: get.marketData.multi
      parameters:
        - name: chain
          in: path
          description: サポートされているネットワークに記載されているチェーン名
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: tokenAddresses
          in: query
          description: カンマ (,) で区切られたトークンアドレスのリスト。最大100件のトークンアドレスが許可されています
          required: true
          schema:
            type: string
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN,EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
      responses:
        '200':
          description: 複数マーケットデータを取得
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  description: Token market data
                  properties:
                    bluechipHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: ブルーチップ保有量の総供給量に対する割合
                      example: '0.05'
                    bluechipTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: ブルーチップウォレット保有者数
                      example: '10'
                    bluechipTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: ブルーチップウォレットの合計保有量
                      example: '50000'
                    bundleHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: バンドル保有量の総供給量に対する割合
                      example: '0.018'
                    bundleTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: バンドルウォレット保有者数
                      example: '12'
                    bundleTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: バンドルウォレットの合計保有量
                      example: '18000'
                    circulatingSupply:
                      type:
                        - string
                        - 'null'
                      description: トークンの流通供給量
                      example: '900000'
                    completionRatio:
                      type:
                        - string
                        - 'null'
                      description: ボンディングカーブの完了率
                      example: '1.0'
                    devHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 開発者保有量の総供給量に対する割合
                      example: '0.005'
                    devTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 開発者ウォレット保有者数
                      example: '3'
                    devTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 開発者ウォレットの合計保有量
                      example: '5000'
                    fdvInSol:
                      type:
                        - string
                        - 'null'
                      description: ネイティブトークン建ての完全希薄化時価総額
                      example: '200000'
                    fdvInUsd:
                      type:
                        - string
                        - 'null'
                      description: USD建ての完全希薄化時価総額
                      example: '200000'
                    freshHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 新規ウォレット保有量の総供給量に対する割合
                      example: '0.01'
                    freshTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 新規ウォレット保有者数
                      example: '30'
                    freshTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 新規ウォレットの合計保有量
                      example: '10000'
                    holders:
                      type:
                        - string
                        - 'null'
                      description: トークン保有者の総数
                      example: '1000'
                    insiderHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: インサイダー保有量の総供給量に対する割合
                      example: '0.02'
                    insiderTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: インサイダーウォレット保有者数
                      example: '5'
                    insiderTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: インサイダーウォレットの合計保有量
                      example: '20000'
                    kolHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: KOL 保有量の総供給量に対する割合
                      example: '0.03'
                    kolTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: KOL（キーオピニオンリーダー）保有者数
                      example: '20'
                    kolTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: KOL ウォレットの合計保有量
                      example: '30000'
                    marketCapInSol:
                      type:
                        - string
                        - 'null'
                      description: ネイティブトークン建ての時価総額
                      example: '100000'
                    marketCapInUsd:
                      type:
                        - string
                        - 'null'
                      description: USD建ての時価総額
                      example: '100000'
                    maxPoolTvlInSol:
                      type:
                        - string
                        - 'null'
                      description: ネイティブトークン建ての最大プール TVL
                      example: '1000.45'
                    maxPoolTvlInUsd:
                      type:
                        - string
                        - 'null'
