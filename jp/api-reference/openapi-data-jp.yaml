          type: string
          description: Chain identifier
          example: sol
        nativeBalance:
          type:
            - string
            - 'null'
          description: Native token balance
          example: '0.5'
        nativeBalanceInUsd:
          type:
            - string
            - 'null'
          description: Native balance in USD
          example: '75.00'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/TokenBalance'
          description: Token balances
        totalValueInUsd:
          type:
            - string
            - 'null'
          description: Total value in USD
          example: '3.369918'
        walletAddress:
          type: string
          description: Wallet address
          example: 8X35rQUK2u9hfn8rMPwwr6ZSEUhbmfDPEapp589XyoM1
    WalletFirstTx:
      type: object
      description: Wallet first transaction summary
      required:
        - txHash
        - blockTime
        - blockNumber
        - balanceChange
        - tokenAddress
        - decimals
      properties:
        balanceChange:
          type: string
          description: 初回トランザクションからの残高変動
          example: '0'
        blockNumber:
          type: integer
          format: int64
          description: ブロック番号
          example: 398645949
        blockTime:
          type: integer
          format: int64
          description: ブロックタイムスタンプ（ミリ秒）
          example: 1717292678000
        decimals:
          type: integer
          format: int32
          description: トークンの小数点以下桁数
          example: 9
        tokenAddress:
          type: string
          description: トークンコントラクトアドレス
          example: '11111111111111111111111111111111'
        txHash:
          type: string
          description: 初回入金トランザクションハッシュ
          example: 5rG9igZk95gbS8ZG66upvRfbcaaDpokQYg4ny3WQ3DrA...
    WalletNetWorth:
      type: object
      description: Wallet net worth summary
      required:
        - walletAddress
        - chain
      properties:
        chain:
          type: string
          description: ブロックチェーンネットワーク識別子
          example: sol
        tokenCount:
          type:
            - integer
            - 'null'
          format: int64
          description: 保有トークン数
          example: 5
        totalValueInNative:
          type:
            - string
            - 'null'
          description: ネイティブトークン建てのポートフォリオ合計額
          example: '0.002'
        totalValueInUsd:
          type:
            - string
            - 'null'
          description: USD建てのポートフォリオ合計額
          example: '3.369918'
        walletAddress:
          type: string
          description: ウォレットアドレス
          example: 8X35rQUK2u9hfn8rMPwwr6ZSEUhbmfDPEapp589XyoM1
    WalletNetWorthChartResponse:
      type: object
      description: Wallet net-worth chart response with pagination.
      required:
        - walletAddress
        - currentTimestamp
        - pastTimestamp
        - history
      properties:
        currentTimestamp:
          type: string
          description: 現在のサーバータイムスタンプ
          example: 2025-07-31T23:59:59.000Z
        history:
          type: array
          items:
            $ref: '#/components/schemas/NetWorthHistoryItem'
          description: 過去の純資産データポイントリスト
        pastTimestamp:
          type: string
          description: チャート期間の開始タイムスタンプ
          example: 2025-07-01T23:59:59.000Z
        walletAddress:
          type: string
          description: ウォレットアドレス
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
    WalletNetWorthDetailsPage:
      type: object
      description: Paginated wallet net-worth details (mirrors TS WalletNetWorthDetailsPage).
      required:
        - walletAddress
        - netWorth
        - requestedTimestamp
        - resolvedTimestamp
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NetWorthByTokensItem'
          description: トークン別純資産アイテムリスト
        endCursor:
          type:
            - string
            - 'null'
          description: 現在のページの終了カーソル
          example: eyJpZCI6ImVuZCJ9
        hasNext:
          type: boolean
          description: 次のページがあるかどうか
          example: false
        hasPrev:
          type: boolean
          description: 前のページがあるかどうか
          example: false
        netWorth:
          type: string
          description: USD建ての純資産額
          example: '11839478.53162622'
        requestedTimestamp:
          type: string
          description: リクエストされたスナップショットタイムスタンプ
          example: 2025-07-31T04:50:06.303Z
        resolvedTimestamp:
          type: string
          description: 実際に解決されたスナップショットタイムスタンプ
          example: 2025-07-31T04:50:06.475Z
        startCursor:
          type:
            - string
            - 'null'
          description: 現在のページの開始カーソル
          example: eyJpZCI6InN0YXJ0In0=
        walletAddress:
          type: string
          description: ウォレットアドレス
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
    WalletNetWorthPage:
      type: object
      description: Paginated wallet net-worth page (mirrors TS WalletNetWorthPage).
      required:
        - walletAddress
        - totalValueInUsd
        - totalValueInNative
        - currentTimestamp
        - data
      properties:
        currentTimestamp:
          type: string
          description: 現在のサーバータイムスタンプ
          example: 2025-10-30T03:33:40.980Z
        data:
          type: array
          items:
            $ref: '#/components/schemas/NetWorthByTokensItem'
          description: トークン別純資産アイテムリスト
        endCursor:
          type:
            - string
            - 'null'
          description: 現在のページの終了カーソル
          example: eyJpZCI6ImVuZCJ9
        hasNext:
          type: boolean
          description: 次のページがあるかどうか
          example: false
        hasPrev:
          type: boolean
          description: 前のページがあるかどうか
          example: false
        startCursor:
          type:
            - string
            - 'null'
          description: 現在のページの開始カーソル
          example: eyJpZCI6InN0YXJ0In0=
        totalValueInNative:
          type: string
          description: ネイティブトークン建てのポートフォリオ合計額
          example: '82.31'
        totalValueInUsd:
          type: string
          description: USD建てのポートフォリオ合計額
          example: '12345.67'
        walletAddress:
          type: string
          description: ウォレットアドレス
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
    WalletNetWorthSummaryResponse:
      type: object
      required:
        - currentTimestamp
        - wallets
      properties:
        currentTimestamp:
          type: string
          description: 現在のサーバータイムスタンプ
          example: 2025-10-30T03:33:40.980Z
        wallets:
          type: object
          description: ウォレットアドレスから純資産額へのマップ
          additionalProperties:
            $ref: '#/components/schemas/NetWorthSummaryValue'
          propertyNames:
            type: string
          example:
            3bovD5jCRn7eG64jZqyEz6Zbx92mHixZSTRrWLy1Sirx:
              value: '1764819473.530063'
    WalletPnlSummary:
      type: object
      description: Wallet PnL Summary (aggregated across all tokens for a given resolution)
      required:
        - walletAddress
        - resolution
        - tokens
        - buys
        - sells
        - totalTrades
        - wins
        - losses
        - winRate
        - buyAmountInUsd
        - sellAmountInUsd
        - totalCostInUsd
        - realizedProfitInUsd
        - realizedProfitRatio
        - unrealizedProfitInUsd
        - unrealizedProfitRatio
        - totalProfitInUsd
        - totalProfitRatio
        - avgProfitPerTradeInUsd
      properties:
        avgProfitPerTradeInUsd:
          type: string
          description: USD建ての取引あたり平均損益
          example: '402.86'
        buyAmountInUsd:
          type: string
          description: USD建ての総買い金額
          example: '101371192.39'
        buys:
          type: string
          description: 買い取引の総数
          example: '1515999'
        losses:
          type: string
          description: 損失が出た取引数
          example: '348350'
        realizedProfitInUsd:
          type: string
          description: USD建ての実現損益
          example: '802583.91'
        realizedProfitRatio:
          type: string
          description: 実現損益率
          example: '0.0035521324'
        resolution:
          type: string
          description: PnL 時間解像度
          example: 1d
        sellAmountInUsd:
          type: string
          description: USD建ての総売り金額
          example: '60369621.10'
        sells:
          type: string
          description: 売り取引の総数
          example: '1011994'
        tokens:
          type: string
          description: 取引トークンの総数
          example: '15126'
        totalCostInUsd:
          type: string
          description: USD建ての総コスト基準
          example: '225944253.64'
        totalProfitInUsd:
          type: string
          description: USD建ての合計損益（実現＋未実現）
          example: '1018427683.08'
        totalProfitRatio:
          type: string
          description: 合計損益率
          example: '4.5074290081'
        totalTrades:
          type: string
          description: 全取引の総数
          example: '2527993'
        unrealizedProfitInUsd:
          type: string
          description: USD建ての未実現損益
          example: '1017625099.17'
        unrealizedProfitRatio:
          type: string
          description: 未実現損益率
          example: '4.5038768756'
        updatedAt:
          type:
            - string
            - 'null'
          description: 最終更新タイムスタンプ
          example: 2026-02-04T11:42:50.000Z
        walletAddress:
          type: string
          description: ウォレットアドレス
          example: 54Pz1e35z9uoFdnxtzjp7xZQoFiofqhdayQWBMN7dsuy
        winRate:
          type: string
          description: 勝ちトレードの全トレードに対する割合
          example: '0.5575'
        wins:
          type: string
          description: 利益が出た取引数
          example: '438944'
    WalletTransfer:
      type: object
      description: Wallet transfer
      required:
        - id
        - transactionSignature
        - blockTimestamp
        - tokenAddress
        - fromAddress
        - toAddress
        - amount
        - transferType
      properties:
        amount:
          type: string
          description: トークン単位での送金額
          example: '1.5'
        amountInUsd:
          type:
            - string
            - 'null'
          description: USD建ての送金額
          example: '225.00'
        blockTimestamp:
          type: integer
          format: int64
          description: ブロックタイムスタンプ（ミリ秒）
          example: 1717334400000
        fromAddress:
          type: string
          description: 送信者アドレス
          example: 54Pz1e35z9uoFdnxtzjp7xZQoFiofqhdayQWBMN7dsuy
        id:
          type: string
          description: 送金レコード識別子
          example: transfer-123
        toAddress:
          type: string
          description: 受信者アドレス
          example: 8X35rQUK2u9hfn8rMPwwr6ZSEUhbmfDPEapp589XyoM1
        tokenAddress:
          type: string
          description: トークンコントラクトアドレス
          example: So11111111111111111111111111111111111111112
        transactionSignature:
          type: string
          description: トランザクション署名
          example: 4tEHfECrLJm8N7dNCfQSjhLG7LqdMuZhzBhRy7VRhjCt
        transferType:
          type: string
          description: 送金タイプ（SEND または RECEIVE）
          example: SEND
    WalletsMapResponse:
      type: object
      required:
        - wallets
      properties:
        wallets:
          type: object
          description: ウォレットアドレスから初回トランザクション情報へのマップ
          additionalProperties:
            $ref: '#/components/schemas/WalletFirstTx'
          propertyNames:
            type: string
          example:
            3bovD5jCRn7eG64jZqyEz6Zbx92mHixZSTRrWLy1Sirx:
              balanceChange: '0'
              blockNumber: 398645949
              blockTime: 1717292678000
              decimals: 9
              tokenAddress: '11111111111111111111111111111111'
              txHash: 5rG9igZk95gbS8ZG66upvRfbcaaDpokQYg4ny3WQ3DrA...
    Watchlist:
      type: object
      description: Watchlist entity
      required:
        - userId
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
          description: List of watchlist items
        userId:
          type: string
          description: User ID or identifier
    WatchlistAddResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: アドレスの追加に成功したかどうか
          example: true
    WatchlistItem:
      type: object
      description: Watchlist item
      required:
        - chain
        - walletAddress
      properties:
        chain:
          type: string
          description: Chain identifier
        walletAddress:
          type: string
          description: Wallet address being watched
    WebhookChannel:
      type: string
      description: Webhook event channel
      enum:
        - sol.token.migrated
        - sol.token.created
    WebhookEndpoint:
      type: object
      description: Webhook endpoint response
      required:
        - id
        - url
      properties:
        channels:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/WebhookChannel'
          description: 購読する Webhook イベントチャネル
        createdAt:
          type:
            - string
            - 'null'
          description: エンドポイント作成タイムスタンプ
          example: 2021-01-01
        description:
          type:
            - string
            - 'null'
          description: エンドポイントの説明
          example: Webhook description
        disabled:
          type:
            - boolean
            - 'null'
          description: エンドポイントが無効かどうか
          example: false
        filter:
          type:
            - string
            - 'null'
          description: イベントフィルタ設定
        filterTypes:
          type:
            - array
            - 'null'
          items:
            type: string
          description: イベントタイプフィルタ
        id:
          type: string
          description: エンドポイント内部 ID
          example: ep_01HT7Z4QJ7N2Q9W8P6V3K5M1X2
        metadata:
          type:
            - object
            - 'null'
          description: エンドポイントメタデータ
          additionalProperties: {}
          propertyNames:
            type: string
          example:
            key: value
        rateLimit:
          type:
            - integer
            - 'null'
          format: int32
          description: エンドポイントのレート制限
          example: 1000
          minimum: 0
        updatedAt:
          type:
            - string
            - 'null'
          description: エンドポイント最終更新タイムスタンプ
          example: 2021-01-01
        url:
          type: string
          description: Webhook 送信先 URL
          example: https://example.com
  securitySchemes:
    api_key_auth:
      type: apiKey
