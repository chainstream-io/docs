          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: walletAddress
          in: path
          description: 지갑 주소
          required: true
          schema:
            type: string
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistAddResponse'
  /v2/webhook/endpoint:
    get:
      tags:
        - Webhook
      summary: 엔드포인트 - 목록
      description: Webhook 엔드포인트 목록 조회
      operationId: list.endpoints
      parameters:
        - name: limit
          in: query
          description: 페이지당 결과 수
          required: false
          schema:
            type: integer
            format: int64
            maximum: 100
            minimum: 1
          example: 100
        - name: iterator
          in: query
          description: 페이지네이션 반복자
          required: false
          schema:
            type: string
        - name: order
          in: query
          description: 정렬 순서
          required: false
          schema:
            $ref: '#/components/schemas/EndpointOrder'
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointListResponse'
      security:
        - bearer_auth:
            - webhook.read
        - api_key_auth: []
    post:
      tags:
        - Webhook
      summary: 엔드포인트 - 생성
      description: 새 Webhook 엔드포인트 생성
      operationId: create.endpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
        required: true
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpoint'
      security:
        - bearer_auth:
            - webhook.write
        - api_key_auth: []
    patch:
      tags:
        - Webhook
      summary: 엔드포인트 - 업데이트
      description: Webhook 엔드포인트 설정 업데이트
      operationId: update.endpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
        required: true
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpoint'
      security:
        - bearer_auth:
            - webhook.write
        - api_key_auth: []
  /v2/webhook/endpoint/{id}:
    get:
      tags:
        - Webhook
      summary: 엔드포인트 - 조회
      description: Webhook 엔드포인트 상세 조회
      operationId: get.endpoint
      parameters:
        - name: id
          in: path
          description: 엔드포인트 ID
          required: true
          schema:
            type: string
          example: wh_01HT7Z4QJ7N2Q9W8P6V3K5M1X2
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpoint'
      security:
        - bearer_auth:
            - webhook.read
        - api_key_auth: []
    delete:
      tags:
        - Webhook
      summary: 엔드포인트 - 삭제
      description: Webhook 엔드포인트 삭제
      operationId: delete.endpoint
      parameters:
        - name: id
          in: path
          description: 엔드포인트 ID
          required: true
          schema:
            type: string
          example: wh_01HT7Z4QJ7N2Q9W8P6V3K5M1X2
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointOperationResponse'
      security:
        - bearer_auth:
            - webhook.write
        - api_key_auth: []
  /v2/webhook/endpoint/{id}/secret:
    get:
      tags:
        - Webhook
      summary: 엔드포인트 - 시크릿 조회
      description: Webhook 엔드포인트 시크릿 조회
      operationId: get.endpoint.secret
      parameters:
        - name: id
          in: path
          description: 엔드포인트 ID
          required: true
          schema:
            type: string
          example: wh_01HT7Z4QJ7N2Q9W8P6V3K5M1X2
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointSecretResponse'
      security:
        - bearer_auth:
            - webhook.read
        - api_key_auth: []
  /v2/webhook/endpoint/{id}/secret/rotate:
    post:
      tags:
        - Webhook
      summary: 엔드포인트 - 시크릿 로테이션
      description: Webhook 엔드포인트의 시크릿 키 로테이션
      operationId: rotate.endpoint.secret
      parameters:
        - name: id
          in: path
          description: 엔드포인트 ID
          required: true
          schema:
            type: string
          example: wh_01HT7Z4QJ7N2Q9W8P6V3K5M1X2
      responses:
        '200':
          description: 성공 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointOperationResponse'
      security:
        - bearer_auth:
            - webhook.write
        - api_key_auth: []
components:
  schemas:
    ActivityType:
      type: string
      description: 활동 유형(TradeType 확장)
      enum:
        - BUY
        - SELL
        - LIQUIDITY_INITIALIZE
        - LIQUIDITY_ADD
        - LIQUIDITY_REMOVE
        - RED_PACKET_CREATE
        - RED_PACKET_CLAIM
        - RED_PACKET_COMPLETE
        - RED_PACKET_REFUND
    BalanceChangeType:
      type: string
      description: 잔액 변경 유형
      enum:
        - INCREASE
        - DECREASE
    BalanceTokenType:
      type: string
      description: 잔액 토큰 유형
      enum:
        - SOL
        - SPL
    BalanceUpdate:
      type: object
      description: 잔액 업데이트 레코드
      required:
        - blockHash
        - blockHeight
        - blockTimestamp
        - transactionSignature
        - index
        - tokenAddress
        - tokenAccountAddress
        - accountOwnerAddress
        - preBalance
        - preBalanceInNative
        - preBalanceInUsd
        - postBalance
        - postBalanceInNative
        - postBalanceInUsd
        - balanceChange
        - balanceChangeInNative
        - balanceChangeInUsd
        - type
        - changeType
      properties:
        accountOwnerAddress:
          type: string
          description: 계정 소유자 지갑 주소
        balanceChange:
          type: string
          description: 잔액 변동 수량
        balanceChangeInNative:
          type: string
          description: 네이티브 토큰 기준 잔액 변동
        balanceChangeInUsd:
          type: string
          description: USD 기준 잔액 변동
        blockHash:
          type: string
          description: 블록 해시
        blockHeight:
          type: integer
          format: int64
          description: 블록 높이
        blockSlot:
          type:
            - integer
            - 'null'
          format: int64
          description: 블록 슬롯 번호
        blockTimestamp:
          type: integer
          format: int64
          description: 블록 타임스탬프 (밀리초)
        changeType:
          $ref: '#/components/schemas/BalanceChangeType'
          description: 잔액 변동 방향 (INCREASE 또는 DECREASE)
        index:
          type: integer
          format: int64
          description: 트랜잭션 인스트럭션 인덱스
        postBalance:
          type: string
          description: 트랜잭션 이후 잔액
        postBalanceInNative:
          type: string
          description: 네이티브 토큰 기준 이후 잔액
        postBalanceInUsd:
          type: string
          description: USD 기준 이후 잔액
        preBalance:
          type: string
          description: 트랜잭션 이전 잔액
        preBalanceInNative:
          type: string
          description: 네이티브 토큰 기준 이전 잔액
        preBalanceInUsd:
          type: string
          description: USD 기준 이전 잔액
        tokenAccountAddress:
          type: string
          description: 토큰 계정 주소
        tokenAddress:
          type: string
          description: 토큰 컨트랙트 주소
        transactionSignature:
          type: string
          description: 트랜잭션 서명
        type:
          $ref: '#/components/schemas/BalanceTokenType'
          description: '토큰 유형 (SOL: 네이티브, SPL: 토큰)'
    Blockchain:
      type: object
      description: 블록체인 정보
      required:
        - symbol
        - name
        - explorerUrl
        - chainId
      properties:
        chainId:
          type: integer
          format: int64
          description: 블록체인 체인 ID
          example: 1
        explorerUrl:
          type: string
          description: 블록체인 익스플로러 URL
          example: https://explorer.solana.com
        name:
          type: string
          description: 블록체인 표시 이름
          example: Solana
        symbol:
          type: string
          description: 블록체인 티커 심볼
          example: SOL
    BlockchainLatestBlock:
      type: object
      required:
        - blockhash
        - lastValidBlockHeight
      properties:
        blockhash:
          type: string
          description: 최신 블록 해시
          example: '123'
        lastValidBlockHeight:
          type: integer
          format: int64
          description: 마지막 유효 블록 높이
          example: 123
    BooleanResult:
      type: object
      description: Boolean 결과 응답
      required:
        - result
      properties:
        result:
          type: boolean
          description: 불리언 결과 값
          example: true
    CalculatePnlInput:
      type: object
      properties:
        tokenAddresses:
          type:
            - array
            - 'null'
          items:
            type: string
          description: PnL 계산 대상 토큰 주소 목록
          example:
            - 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
            - So11111111111111111111111111111111111111112
    ChainSymbol:
      type: string
      description: 지원되는 블록체인
      enum:
        - sol
        - eth
        - bsc
    ClaimRedPacketRequest:
      type: object
      description: 수령자 지갑 주소
      required:
        - claimer
      properties:
        claimer:
          type: string
          description: 수령자 지갑 주소
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        packetId:
          type:
            - string
            - 'null'
          description: 레드패킷 온체인 ID
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: 레드패킷 수령 비밀번호
          example: '123456'
        shareId:
          type:
            - string
            - 'null'
          description: 공유 식별자
          example: abc123
    ClaimRedPacketResponse:
      type: object
      description: 레드패킷 수령 응답
      required:
        - txSerialize
      properties:
        txSerialize:
          type: string
          description: 직렬화된 트랜잭션 데이터
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateRedPacketRequest:
      type: object
      description: 생성자 지갑 주소
      required:
        - creator
        - mint
        - maxClaims
      properties:
        claimAuthority:
          type:
            - string
            - 'null'
          description: 수령 권한 주소
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        creator:
          type: string
          description: 생성자 지갑 주소
          example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        expiration:
          type:
            - integer
            - 'null'
          format: int64
          description: 만료 기간 (초)
          example: 24
        fixedAmount:
          type:
            - string
            - 'null'
          description: 수령당 고정 금액
          example: '1000000000'
        maxClaims:
          type: integer
          format: int32
          description: 허용된 최대 수령 횟수
          example: 10
        memo:
          type:
            - string
            - 'null'
          description: 레드패킷 메모 메시지
          example: Happy Red Packet
        mint:
          type: string
          description: 토큰 Mint 주소
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: 레드패킷 수령 비밀번호
          example: '123456'
        totalAmount:
          type:
            - string
            - 'null'
          description: 레드패킷 총 금액
          example: '1000000000'
    CreateRedPacketResponse:
      type: object
      description: 레드패킷 생성 응답
      required:
        - txSerialize
        - shareId
      properties:
        shareId:
          type: string
          description: 공유 식별자
          example: abc123
        txSerialize:
          type: string
          description: 직렬화된 트랜잭션 데이터
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateWebhookRequest:
      type: object
      description: Webhook 엔드포인트 생성 요청
      required:
        - url
      properties:
        channels:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/WebhookChannel'
          description: 구독할 Webhook 이벤트 채널
        description:
          type:
            - string
            - 'null'
          description: 엔드포인트 설명
          example: Webhook description
        disabled:
          type:
            - boolean
            - 'null'
          description: 엔드포인트 비활성화 여부
          example: false
        filter:
          type:
            - string
            - 'null'
          description: 이벤트 필터 설정
        filterTypes:
          type:
            - array
            - 'null'
          items:
            type: string
          description: 이벤트 유형 필터
        metadata:
          type:
            - object
            - 'null'
          description: 엔드포인트 메타데이터
          additionalProperties: {}
          propertyNames:
            type: string
          example:
            key: value
        rateLimit:
          type:
            - integer
            - 'null'
          format: int32
          description: 엔드포인트 속도 제한
          example: 1000
          minimum: 0
        secret:
          type:
            - string
            - 'null'
          description: 엔드포인트 서명 시크릿
        url:
          type: string
          description: Webhook 수신 URL
          example: https://example.com
    DevToken:
      type: object
      description: '`get_dev_tokens` 가 반환하는 토큰 정보 — TS `DevTokenDTO` 대응.'
      required:
        - address
        - metadata
        - marketData
        - stats
      properties:
        address:
          type: string
          description: 토큰 주소
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
        marketData:
          $ref: '#/components/schemas/TokenMarketData'
          description: 시장 데이터
        metadata:
          $ref: '#/components/schemas/TokenMetadata'
          description: 토큰 메타데이터
        stats:
          $ref: '#/components/schemas/TokenStats'
          description: 거래 통계
    Dex:
      type: object
      description: DEX 정보
      required:
        - chain
      properties:
        chain:
          type: string
          description: 체인 식별자
          example: sol
        image:
          type:
            - string
            - 'null'
          description: DEX 이미지 URL
          example: https://example.com/dex-logo.png
        programAddress:
          type:
            - string
            - 'null'
          description: DEX 프로그램 주소
          example: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
        protocolFamily:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexProtocolFamily'
              description: 프로토콜 패밀리 이름
    DexPool:
      type: object
      description: DEX 풀
      required:
        - poolAddress
        - chain
        - tokenAAddress
        - tokenBAddress
      properties:
        chain:
          type: string
          description: 체인
          example: sol
        poolAddress:
          type: string
          description: 풀 주소
          example: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
        programAddress:
          type:
            - string
            - 'null'
          description: DEX 프로그램 주소
          example: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
        protocolFamily:
          type:
            - string
            - 'null'
          description: 프로토콜 패밀리
          example: raydium
        tokenAAddress:
          type: string
          description: Token A 주소
          example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        tokenBAddress:
          type: string
          description: Token B 주소
          example: So11111111111111111111111111111111111111112
        tvlInSol:
          type:
            - string
            - 'null'
          description: TVL（네이티브 토큰）
          example: '1000000.45'
        tvlInUsd:
          type:
            - string
            - 'null'
          description: TVL（USD）
          example: '1000000.45'
    DexPoolDetail:
      type: object
      description: DEX 풀 상세
      required:
        - poolAddress
        - chain
        - tokenAAddress
        - tokenBAddress
      properties:
        chain:
          type: string
          description: 체인 식별자
        createdBlockTimestamp:
          type:
            - string
            - 'null'
          description: 생성 블록 타임스탬프
        feeRate:
          type:
            - string
            - 'null'
          description: 수수료율
        image:
          type:
            - string
            - 'null'
          description: 이미지 URL
        liquidityModel:
          type:
            - integer
            - 'null'
          format: int32
          description: 유동성 모델
          minimum: 0
        poolAddress:
          type: string
          description: 풀 주소
        programAddress:
          type:
            - string
            - 'null'
          description: DEX 프로그램 주소
        protocolFamily:
          type:
            - string
            - 'null'
          description: 프로토콜 패밀리
        protocolName:
          type:
            - string
            - 'null'
          description: 프로토콜 이름
        tickSpacing:
          type:
            - integer
            - 'null'
          format: int64
          description: Tick 간격
        tokenAAddress:
          type: string
          description: Token A 주소
        tokenALiquidity:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexPoolTokenLiquidity'
              description: Token A 유동성
        tokenBAddress:
          type: string
          description: Token B 주소
        tokenBLiquidity:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexPoolTokenLiquidity'
              description: Token B 유동성
        tokenCount:
          type:
            - integer
            - 'null'
          format: int32
          description: 토큰 개수
        tvlInSol:
          type:
            - string
            - 'null'
          description: TVL（네이티브 토큰）
        tvlInUsd:
          type:
            - string
            - 'null'
          description: TVL（USD）
        type:
          type:
            - integer
            - 'null'
          format: int32
          description: 풀 유형
          minimum: 0
        version:
          type:
            - integer
            - 'null'
          format: int32
          description: 풀 버전
          minimum: 0
      example:
        chain: sol
        createdBlockTimestamp: 2024-01-15T10:30:00Z
        feeRate: '0.003'
        image: https://example.com/pool.png
        liquidityModel: 1
        poolAddress: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
        programAddress: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
        protocolFamily: OrcaWhirpool
        protocolName: Orca
        tickSpacing: 64
        tokenAAddress: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        tokenALiquidity:
          amountInNative: '5000.123'
          amountInUsd: '1000000.45'
          decimals: 6
          priceNative: '0.005'
          priceUsd: '1.0001'
          tokenAddress: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
          vaultAmount: '1000000000000'
        tokenBAddress: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        tokenBLiquidity:
