      type: object
      description: |-
        토큰 엔티티 — TS `TokenDTO extends TokenMetadataDTO`와 일치.

        TS는 클래스 상속으로 메타데이터를 최상위로 평탄화합니다.
        Rust는 `#[serde(flatten)]`로 동일한 효과를 얻습니다.
