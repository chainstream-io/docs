          example: '3.369918'
        walletAddress:
          type: string
          description: 지갑 주소
          example: 8X35rQUK2u9hfn8rMPwwr6ZSEUhbmfDPEapp589XyoM1
    WalletNetWorthChartResponse:
      type: object
      description: 페이지네이션이 포함된 지갑 순자산 차트 응답.
      required:
        - walletAddress
        - currentTimestamp
        - pastTimestamp
        - history
      properties:
        currentTimestamp:
          type: string
          description: 현재 서버 타임스탬프
          example: 2025-07-31T23:59:59.000Z
        history:
          type: array
          items:
            $ref: '#/components/schemas/NetWorthHistoryItem'
          description: 과거 순자산 데이터 포인트 목록
        pastTimestamp:
          type: string
          description: 차트 기간 시작 타임스탬프
          example: 2025-07-01T23:59:59.000Z
        walletAddress:
          type: string
          description: 지갑 주소
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
    WalletNetWorthDetailsPage:
      type: object
      description: 페이지네이션된 지갑 순자산 상세(TS WalletNetWorthDetailsPage에 대응).
      required:
        - walletAddress
        - netWorth
        - requestedTimestamp
        - resolvedTimestamp
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NetWorthByTokensItem'
          description: 토큰별 순자산 항목 목록
        endCursor:
          type:
            - string
            - 'null'
          description: 현재 페이지 종료 커서
          example: eyJpZCI6ImVuZCJ9
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
          example: false
        hasPrev:
          type: boolean
          description: 이전 페이지 존재 여부
          example: false
        netWorth:
          type: string
          description: USD 기준 순자산 가치
          example: '11839478.53162622'
        requestedTimestamp:
          type: string
          description: 요청된 스냅샷 타임스탬프
          example: 2025-07-31T04:50:06.303Z
        resolvedTimestamp:
          type: string
          description: 실제 적용된 스냅샷 타임스탬프
          example: 2025-07-31T04:50:06.475Z
        startCursor:
          type:
            - string
            - 'null'
          description: 현재 페이지 시작 커서
          example: eyJpZCI6InN0YXJ0In0=
        walletAddress:
          type: string
          description: 지갑 주소
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
    WalletNetWorthPage:
      type: object
      description: 페이지네이션된 지갑 순자산 페이지(TS WalletNetWorthPage에 대응).
      required:
        - walletAddress
        - totalValueInUsd
        - totalValueInNative
        - currentTimestamp
        - data
      properties:
        currentTimestamp:
          type: string
          description: 현재 서버 타임스탬프
          example: 2025-10-30T03:33:40.980Z
        data:
          type: array
          items:
            $ref: '#/components/schemas/NetWorthByTokensItem'
          description: 토큰별 순자산 항목 목록
        endCursor:
          type:
            - string
            - 'null'
          description: 현재 페이지 종료 커서
          example: eyJpZCI6ImVuZCJ9
        hasNext:
          type: boolean
          description: 다음 페이지 존재 여부
          example: false
        hasPrev:
          type: boolean
          description: 이전 페이지 존재 여부
          example: false
        startCursor:
          type:
            - string
            - 'null'
          description: 현재 페이지 시작 커서
          example: eyJpZCI6InN0YXJ0In0=
        totalValueInNative:
          type: string
          description: 네이티브 토큰 기준 총 포트폴리오 가치
          example: '82.31'
        totalValueInUsd:
          type: string
          description: USD 기준 총 포트폴리오 가치
          example: '12345.67'
        walletAddress:
          type: string
          description: 지갑 주소
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
    WalletNetWorthSummaryResponse:
      type: object
      required:
        - currentTimestamp
        - wallets
      properties:
        currentTimestamp:
          type: string
          description: 현재 서버 타임스탬프
          example: 2025-10-30T03:33:40.980Z
        wallets:
          type: object
          description: 지갑 주소별 순자산 매핑
          additionalProperties:
            $ref: '#/components/schemas/NetWorthSummaryValue'
          propertyNames:
            type: string
          example:
            3bovD5jCRn7eG64jZqyEz6Zbx92mHixZSTRrWLy1Sirx:
              value: '1764819473.530063'
    WalletPnlSummary:
      type: object
      description: 지갑 PnL 요약(주어진 해상도에서 모든 토큰에 걸쳐 집계)
      required:
        - walletAddress
        - resolution
        - tokens
        - buys
        - sells
        - totalTrades
        - wins
        - losses
        - winRate
        - buyAmountInUsd
        - sellAmountInUsd
        - totalCostInUsd
        - realizedProfitInUsd
        - realizedProfitRatio
        - unrealizedProfitInUsd
        - unrealizedProfitRatio
        - totalProfitInUsd
        - totalProfitRatio
        - avgProfitPerTradeInUsd
      properties:
        avgProfitPerTradeInUsd:
          type: string
          description: USD 기준 거래당 평균 수익
          example: '402.86'
        buyAmountInUsd:
          type: string
          description: USD 기준 총 매수 금액
          example: '101371192.39'
        buys:
          type: string
          description: 총 매수 거래 건수
          example: '1515999'
        losses:
          type: string
          description: 손실 거래 건수
          example: '348350'
        realizedProfitInUsd:
          type: string
          description: USD 기준 실현 수익
          example: '802583.91'
        realizedProfitRatio:
          type: string
          description: 실현 수익률
          example: '0.0035521324'
        resolution:
          type: string
          description: PnL 기간 해상도
          example: 1d
        sellAmountInUsd:
          type: string
          description: USD 기준 총 매도 금액
          example: '60369621.10'
        sells:
          type: string
          description: 총 매도 거래 건수
          example: '1011994'
        tokens:
          type: string
          description: 총 거래 토큰 수
          example: '15126'
        totalCostInUsd:
          type: string
          description: USD 기준 총 비용 기반
          example: '225944253.64'
        totalProfitInUsd:
          type: string
          description: USD 기준 총 수익 (실현 + 미실현)
          example: '1018427683.08'
        totalProfitRatio:
          type: string
          description: 총 수익률
          example: '4.5074290081'
        totalTrades:
          type: string
          description: 총 거래 건수
          example: '2527993'
        unrealizedProfitInUsd:
          type: string
          description: USD 기준 미실현 수익
          example: '1017625099.17'
        unrealizedProfitRatio:
          type: string
          description: 미실현 수익률
          example: '4.5038768756'
        updatedAt:
          type:
            - string
            - 'null'
          description: 마지막 업데이트 타임스탬프
          example: 2026-02-04T11:42:50.000Z
        walletAddress:
          type: string
          description: 지갑 주소
          example: 54Pz1e35z9uoFdnxtzjp7xZQoFiofqhdayQWBMN7dsuy
        winRate:
          type: string
          description: 총 거래 대비 수익 거래 비율
          example: '0.5575'
        wins:
          type: string
          description: 수익 거래 건수
          example: '438944'
    WalletTransfer:
      type: object
      description: 지갑 전송
      required:
        - id
        - transactionSignature
        - blockTimestamp
        - tokenAddress
        - fromAddress
        - toAddress
        - amount
        - transferType
      properties:
        amount:
          type: string
          description: 토큰 단위 전송 수량
          example: '1.5'
        amountInUsd:
          type:
            - string
            - 'null'
          description: USD 기준 전송 금액
          example: '225.00'
        blockTimestamp:
          type: integer
          format: int64
          description: 블록 타임스탬프 (밀리초)
          example: 1717334400000
        fromAddress:
          type: string
          description: 발신 주소
          example: 54Pz1e35z9uoFdnxtzjp7xZQoFiofqhdayQWBMN7dsuy
        id:
          type: string
          description: 전송 기록 식별자
          example: transfer-123
        toAddress:
          type: string
          description: 수신 주소
          example: 8X35rQUK2u9hfn8rMPwwr6ZSEUhbmfDPEapp589XyoM1
        tokenAddress:
          type: string
          description: 토큰 컨트랙트 주소
          example: So11111111111111111111111111111111111111112
        transactionSignature:
          type: string
          description: 트랜잭션 서명
          example: 4tEHfECrLJm8N7dNCfQSjhLG7LqdMuZhzBhRy7VRhjCt
        transferType:
          type: string
          description: 전송 유형 (SEND 또는 RECEIVE)
          example: SEND
    WalletsMapResponse:
      type: object
      required:
        - wallets
      properties:
        wallets:
          type: object
          description: 지갑 주소별 최초 트랜잭션 정보 매핑
          additionalProperties:
            $ref: '#/components/schemas/WalletFirstTx'
          propertyNames:
            type: string
          example:
            3bovD5jCRn7eG64jZqyEz6Zbx92mHixZSTRrWLy1Sirx:
              balanceChange: '0'
              blockNumber: 398645949
              blockTime: 1717292678000
              decimals: 9
              tokenAddress: '11111111111111111111111111111111'
              txHash: 5rG9igZk95gbS8ZG66upvRfbcaaDpokQYg4ny3WQ3DrA...
    Watchlist:
      type: object
      description: 관심 목록 엔티티
      required:
        - userId
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
          description: 관심 목록 항목 리스트
        userId:
          type: string
          description: 사용자 ID 또는 식별자
    WatchlistAddResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: 주소 추가 성공 여부
          example: true
    WatchlistItem:
      type: object
      description: 관심 목록 항목
      required:
        - chain
        - walletAddress
      properties:
        chain:
          type: string
          description: 체인 식별자
        walletAddress:
          type: string
          description: 감시 중인 지갑 주소
    WebhookChannel:
      type: string
      description: Webhook 이벤트チャンネル
      enum:
        - sol.token.migrated
        - sol.token.created
    WebhookEndpoint:
      type: object
      description: Webhook 엔드포인트 응답
      required:
        - id
        - url
      properties:
        channels:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/WebhookChannel'
          description: 구독할 Webhook 이벤트 채널
        createdAt:
          type:
            - string
            - 'null'
          description: 엔드포인트 생성 타임스탬프
          example: 2021-01-01
        description:
          type:
            - string
            - 'null'
          description: 엔드포인트 설명
          example: Webhook description
        disabled:
          type:
            - boolean
            - 'null'
          description: 엔드포인트 비활성화 여부
          example: false
        filter:
          type:
            - string
            - 'null'
          description: 이벤트 필터 설정
        filterTypes:
          type:
            - array
            - 'null'
          items:
            type: string
          description: 이벤트 유형 필터
        id:
          type: string
          description: 엔드포인트 내부 ID
          example: ep_01HT7Z4QJ7N2Q9W8P6V3K5M1X2
        metadata:
          type:
            - object
            - 'null'
          description: 엔드포인트 메타데이터
          additionalProperties: {}
          propertyNames:
            type: string
          example:
            key: value
        rateLimit:
          type:
            - integer
            - 'null'
          format: int32
          description: 엔드포인트 속도 제한
          example: 1000
          minimum: 0
        updatedAt:
          type:
            - string
            - 'null'
          description: 엔드포인트 마지막 업데이트 타임스탬프
          example: 2021-01-01
        url:
          type: string
          description: Webhook 수신 URL
          example: https://example.com
  securitySchemes:
    api_key_auth:
      type: apiKey
