      description: 다중 토큰의 메타데이터 조회
      operationId: get.metadata.multi
      parameters:
        - name: chain
          in: path
          description: 지원되는 네트워크에 나열된 체인 이름
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: tokenAddresses
          in: query
          description: 쉼표(,)로 구분된 토큰 주소 목록. 최대 100개의 토큰 주소 허용
          required: true
          schema:
            type: string
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN,EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
      responses:
        '200':
          description: 다중 메타데이터 조회
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  description: 토큰 메타데이터
                  required:
                    - address
                    - chain
                    - symbol
                    - name
                    - decimals
                  properties:
                    address:
                      type: string
                      description: 토큰 컨트랙트 주소
                      example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
                    chain:
                      type: string
                      description: 블록체인 네트워크 식별자
                      example: sol
                    coingeckoCoinId:
                      type:
                        - string
                        - 'null'
                      description: CoinGecko 코인 식별자
                      example: usd-coin
                    decimals:
                      type: string
                      description: 소수점 자릿수
                      example: '9'
                    description:
                      type:
                        - string
                        - 'null'
                      description: 토큰 설명
                      example: USDC is a stablecoin pegged to the US dollar
                    devLastTokenCreatedAt:
                      type:
                        - string
                        - 'null'
                      description: 개발자의 마지막 토큰 생성 타임스탬프
                      example: 2025-12-03T09:23:34.000Z
                    devTotalTokens:
                      type:
                        - string
                        - 'null'
                      description: 개발자가 생성한 총 토큰 수
                      example: '163'
                    extra:
                      $ref: '#/components/schemas/TokenExtra'
                      description: 확장 토큰 메타데이터
                    imageUrl:
                      type:
                        - string
                        - 'null'
                      description: 토큰 로고 이미지 URL
                      example: https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v/logo.png
                    metadataAddress:
                      type:
                        - string
                        - 'null'
                      description: 온체인 메타데이터 계정 주소
                      example: metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s
                    name:
                      type: string
                      description: 토큰 표시 이름
                      example: USD Coin
                    socialMedias:
                      $ref: '#/components/schemas/TokenSocialMedias'
                      description: 토큰 소셜 미디어 링크
                    symbol:
                      type: string
                      description: 토큰 티커 심볼
                      example: USDC
                    tokenCreatedAt:
                      type:
                        - integer
                        - 'null'
                      format: int64
                      description: 토큰 생성 타임스탬프 (밀리초)
                      example: 1710417600000
                    tokenCreatedBlockHeight:
                      type:
                        - string
                        - 'null'
                      description: 토큰이 생성된 블록 높이
                      example: '220000000'
                    tokenCreatedSlot:
                      type:
                        - string
                        - 'null'
                      description: 토큰이 생성된 슬롯 번호
                      example: '230000000'
                    tokenCreatedTxSignature:
                      type:
                        - string
                        - 'null'
                      description: 토큰 생성 트랜잭션 서명
                      example: 5dJ1BxPiFT7w7aBdkxNy2jopGZnZoLwRwS8e9GkEXrVz...
                    tokenCreators:
                      type: array
                      items:
                        $ref: '#/components/schemas/TokenCreator'
                      description: 토큰 생성자 목록
                    updatedAt:
                      type:
                        - string
                        - 'null'
                      description: 마지막 업데이트 타임스탬프
                      example: 2026-02-09T08:05:12.345Z
                    uri:
                      type:
                        - string
                        - 'null'
                      description: 토큰 메타데이터 URI
                      example: https://arweave.net/abc123
                propertyNames:
                  type: string
              example:
                6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN:
                  address: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
                  chain: sol
                  decimals: '9'
                  imageUrl: https://example.com/sol.png
                  name: Solana
                  symbol: SOL
