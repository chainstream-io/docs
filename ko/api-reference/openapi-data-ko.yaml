                    - periods
                  properties:
                    address:
                      type: string
                      description: 토큰 컨트랙트 주소
                      example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
                    periods:
                      type: object
                      description: |-
                        시간 주기(1m, 5m, 15m, 30m, 1h, 4h, 24h)별로 집계된 거래 통계.
                        각 주기에는 전체 OHLCV 데이터, 거래 건수, 이전 주기 대비 비교가 포함됩니다.
                        전체 필드는 `TokenTradeStatPeriod` 스키마를 참조하세요.
                      additionalProperties:
                        $ref: '#/components/schemas/TokenTradeStatPeriod'
                      propertyNames:
                        type: string
                      example:
                        24h:
                          buyVolumeInUsd: '45000.00'
                          buyers: '320'
                          buys: '1520'
                          closeInUsd: '0.15600000'
                          currentLiquidityInUsd: '250000.00'
                          highInUsd: '0.15900000'
                          lowInUsd: '0.15000000'
                          openInUsd: '0.15000000'
                          priceChangeRatioInUsd: '0.04000000'
                          sellVolumeInUsd: '36000.00'
                          sellers: '210'
                          sells: '980'
                          totalVolumeInUsd: '81000.00'
                          traders: '530'
                          trades: '2500'
                propertyNames:
                  type: string
              example:
                6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN:
                  address: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
                  periods:
                    24h:
                      buyVolume: '15000000.12345678'
                      buyVolumeInUsd: '45000.00'
                      buyers: '320'
                      buys: '1520'
                      closeInUsd: '0.15600000'
                      highInUsd: '0.15900000'
                      lowInUsd: '0.15000000'
                      openInUsd: '0.15000000'
                      priceChangeRatioInUsd: '0.04000000'
                      sellVolume: '12000000.98765432'
                      sellVolumeInUsd: '36000.00'
                      sellers: '210'
                      sells: '980'
                      totalVolumeInUsd: '81000.00'
                      traders: '530'
                      trades: '2500'
