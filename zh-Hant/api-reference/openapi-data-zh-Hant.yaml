        poolAddress:
          type: string
          description: 池地址
          example: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
        programAddress:
          type:
            - string
            - 'null'
          description: DEX 程式地址
          example: 675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8
        protocolFamily:
          type:
            - string
            - 'null'
          description: 協議家族
          example: raydium
        tokenAAddress:
          type: string
