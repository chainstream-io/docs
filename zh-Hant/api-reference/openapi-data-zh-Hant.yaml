  /v2/token/{chain}/marketData/multi:
    get:
      tags:
        - Token
      summary: 代幣 - 市場資料（批次）
      description: 批次取得多個代幣的市場資料
      operationId: get.marketData.multi
      parameters:
        - name: chain
          in: path
          description: 支援網路列表中的鏈名稱
          required: true
          schema:
            $ref: '#/components/schemas/ChainSymbol'
          example: sol
        - name: tokenAddresses
          in: query
          description: 代幣地址列表，以逗號 (,) 分隔的字串。最多允許 100 個代幣地址
          required: true
          schema:
            type: string
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN,EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
      responses:
        '200':
          description: 批次取得市場資料
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  description: 代幣市場資料
                  properties:
                    bluechipHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 藍籌錢包持倉佔總供應量比例
                      example: '0.05'
                    bluechipTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 藍籌錢包持有者數量
                      example: '10'
                    bluechipTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 藍籌錢包總持倉量
                      example: '50000'
                    bundleHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 捆綁錢包持倉佔總供應量比例
                      example: '0.018'
                    bundleTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 捆綁錢包持有者數量
                      example: '12'
                    bundleTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 捆綁錢包總持倉量
                      example: '18000'
                    circulatingSupply:
                      type:
                        - string
                        - 'null'
                      description: 代幣流通供應量
                      example: '900000'
                    completionRatio:
                      type:
                        - string
                        - 'null'
                      description: Bonding Curve 完成比例
                      example: '1.0'
                    devHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 開發者持倉佔總供應量比例
                      example: '0.005'
                    devTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 開發者錢包持有者數量
                      example: '3'
                    devTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 開發者錢包總持倉量
                      example: '5000'
                    fdvInSol:
                      type:
                        - string
                        - 'null'
                      description: 完全稀釋估值（原生代幣計）
                      example: '200000'
                    fdvInUsd:
                      type:
                        - string
                        - 'null'
                      description: 完全稀釋估值（USD 計）
                      example: '200000'
                    freshHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 新錢包持倉佔總供應量比例
                      example: '0.01'
                    freshTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 新錢包持有者數量
                      example: '30'
                    freshTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 新錢包總持倉量
                      example: '10000'
                    holders:
                      type:
                        - string
                        - 'null'
                      description: 代幣持有者總數
                      example: '1000'
                    insiderHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 內部人持倉佔總供應量比例
                      example: '0.02'
                    insiderTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: 內部人錢包持有者數量
                      example: '5'
                    insiderTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: 內部人錢包總持倉量
                      example: '20000'
                    kolHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: KOL 持倉佔總供應量比例
                      example: '0.03'
                    kolTotalHolders:
                      type:
                        - string
                        - 'null'
                      description: KOL（意見領袖）持有者數量
                      example: '20'
                    kolTotalHoldings:
                      type:
                        - string
                        - 'null'
                      description: KOL 錢包總持倉量
                      example: '30000'
                    marketCapInSol:
                      type:
                        - string
                        - 'null'
                      description: 市值（原生代幣計）
                      example: '100000'
                    marketCapInUsd:
                      type:
                        - string
                        - 'null'
                      description: 市值（USD 計）
                      example: '100000'
                    maxPoolTvlInSol:
                      type:
                        - string
                        - 'null'
                      description: 最大池子 TVL（原生代幣計）
                      example: '1000.45'
                    maxPoolTvlInUsd:
                      type:
                        - string
                        - 'null'
                      description: 最大池子 TVL（USD 計）
                      example: '150000.00'
                    priceInSol:
                      type:
                        - string
                        - 'null'
                      description: 代幣價格（原生代幣計）
                      example: '0.00000261383847574915906643405542'
                    priceInUsd:
                      type:
                        - string
                        - 'null'
                      description: 代幣價格（USD 計）
                      example: '0.00000261383847574915906643405542'
                    proHoldingsRatio:
                      type:
                        - string
                        - 'null'
                      description: 專業交易者持倉佔總供應量比例
