            - webhook.write
        - api_key_auth: []
components:
  schemas:
    ActivityType:
      type: string
      description: 活動類型（擴充自 TradeType）
      enum:
        - BUY
        - SELL
        - LIQUIDITY_INITIALIZE
        - LIQUIDITY_ADD
        - LIQUIDITY_REMOVE
        - RED_PACKET_CREATE
        - RED_PACKET_CLAIM
        - RED_PACKET_COMPLETE
        - RED_PACKET_REFUND
    BalanceChangeType:
      type: string
      description: 餘額變動類型
      enum:
        - INCREASE
        - DECREASE
    BalanceTokenType:
      type: string
      description: 餘額代幣類型
      enum:
        - SOL
        - SPL
    BalanceUpdate:
      type: object
      description: 餘額更新記錄
      required:
        - blockHash
        - blockHeight
        - blockTimestamp
        - transactionSignature
        - index
        - tokenAddress
        - tokenAccountAddress
        - accountOwnerAddress
        - preBalance
        - preBalanceInNative
        - preBalanceInUsd
        - postBalance
        - postBalanceInNative
        - postBalanceInUsd
        - balanceChange
        - balanceChangeInNative
        - balanceChangeInUsd
        - type
        - changeType
      properties:
        accountOwnerAddress:
          type: string
          description: 帳戶所有者錢包地址
        balanceChange:
          type: string
          description: 餘額變動量
        balanceChangeInNative:
          type: string
          description: 餘額變動量（原生代幣計）
        balanceChangeInUsd:
          type: string
          description: 餘額變動量（USD 計）
        blockHash:
          type: string
          description: 區塊雜湊
        blockHeight:
          type: integer
          format: int64
          description: 區塊高度
        blockSlot:
          type:
            - integer
            - 'null'
          format: int64
          description: 區塊 Slot 編號
        blockTimestamp:
          type: integer
          format: int64
          description: 區塊時間戳（毫秒）
        changeType:
          $ref: '#/components/schemas/BalanceChangeType'
          description: 餘額變動方向（INCREASE 或 DECREASE）
        index:
          type: integer
          format: int64
          description: 交易指令索引
        postBalance:
          type: string
          description: 交易後餘額
        postBalanceInNative:
          type: string
          description: 交易後餘額（原生代幣計）
        postBalanceInUsd:
          type: string
          description: 交易後餘額（USD 計）
        preBalance:
          type: string
          description: 交易前餘額
        preBalanceInNative:
          type: string
          description: 交易前餘額（原生代幣計）
        preBalanceInUsd:
          type: string
          description: 交易前餘額（USD 計）
        tokenAccountAddress:
          type: string
          description: 代幣帳戶地址
        tokenAddress:
          type: string
          description: 代幣合約地址
        transactionSignature:
          type: string
          description: 交易簽名
        type:
          $ref: '#/components/schemas/BalanceTokenType'
          description: 代幣類型（SOL 為原生代幣，SPL 為代幣）
    Blockchain:
      type: object
      description: 區塊鏈資訊
      required:
        - symbol
        - name
        - explorerUrl
        - chainId
      properties:
        chainId:
          type: integer
          format: int64
          description: 區塊鏈 Chain ID
          example: 1
        explorerUrl:
          type: string
          description: 區塊鏈瀏覽器 URL
          example: https://explorer.solana.com
        name:
          type: string
          description: 區塊鏈顯示名稱
          example: Solana
        symbol:
          type: string
          description: 區塊鏈代號
          example: SOL
    BlockchainLatestBlock:
      type: object
      required:
        - blockhash
        - lastValidBlockHeight
      properties:
        blockhash:
          type: string
          description: 最新區塊雜湊
          example: '123'
        lastValidBlockHeight:
          type: integer
          format: int64
          description: 最新有效區塊高度
          example: 123
    BooleanResult:
      type: object
      description: 布林結果回應
      required:
        - result
      properties:
        result:
          type: boolean
          description: 布林結果值
          example: true
    CalculatePnlInput:
      type: object
      properties:
        tokenAddresses:
          type:
            - array
            - 'null'
          items:
            type: string
          description: 要計算盈虧的代幣地址列表
          example:
            - 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
            - So11111111111111111111111111111111111111112
    ChainSymbol:
      type: string
      description: 支援的區塊鏈
      enum:
        - sol
        - eth
        - bsc
    ClaimRedPacketRequest:
      type: object
      description: 領取者錢包地址
      required:
        - claimer
      properties:
        claimer:
          type: string
          description: 領取者錢包地址
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        packetId:
          type:
            - string
            - 'null'
          description: 紅包鏈上 ID
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: 紅包領取密碼
          example: '123456'
        shareId:
          type:
            - string
            - 'null'
          description: 分享標識
          example: abc123
    ClaimRedPacketResponse:
      type: object
      description: 領取紅包回應
      required:
        - txSerialize
      properties:
        txSerialize:
          type: string
          description: 序列化交易資料
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateRedPacketRequest:
      type: object
      description: 建立者錢包地址
      required:
        - creator
        - mint
        - maxClaims
      properties:
        claimAuthority:
          type:
            - string
            - 'null'
          description: 領取授權地址
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        creator:
          type: string
          description: 建立者錢包地址
          example: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v
        expiration:
          type:
            - integer
            - 'null'
          format: int64
          description: 過期時間（秒）
          example: 24
        fixedAmount:
          type:
            - string
            - 'null'
          description: 每次領取的固定金額
          example: '1000000000'
        maxClaims:
          type: integer
          format: int32
          description: 最大領取次數
          example: 10
        memo:
          type:
            - string
            - 'null'
          description: 紅包留言
          example: Happy Red Packet
        mint:
          type: string
          description: 代幣鑄造地址
          example: Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB
        password:
          type:
            - string
            - 'null'
          description: 紅包領取密碼
          example: '123456'
        totalAmount:
          type:
            - string
            - 'null'
          description: 紅包總金額
          example: '1000000000'
    CreateRedPacketResponse:
      type: object
      description: 建立紅包回應
      required:
        - txSerialize
        - shareId
      properties:
        shareId:
          type: string
          description: 分享標識
          example: abc123
        txSerialize:
          type: string
          description: 序列化交易資料
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRg...
    CreateWebhookRequest:
      type: object
      description: 建立 Webhook 端點請求
      required:
        - url
      properties:
        channels:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/WebhookChannel'
          description: 訂閱的 Webhook 事件通道
        description:
          type:
            - string
            - 'null'
          description: 端點描述
          example: Webhook description
        disabled:
          type:
            - boolean
            - 'null'
          description: 端點是否已停用
          example: false
        filter:
          type:
            - string
            - 'null'
          description: 事件篩選配置
        filterTypes:
          type:
            - array
            - 'null'
          items:
            type: string
          description: 事件類型篩選
        metadata:
          type:
            - object
            - 'null'
          description: 端點元資料
          additionalProperties: {}
          propertyNames:
            type: string
          example:
            key: value
        rateLimit:
          type:
            - integer
            - 'null'
          format: int32
          description: 端點速率限制
          example: 1000
          minimum: 0
        secret:
          type:
            - string
            - 'null'
          description: 端點簽名密鑰
        url:
          type: string
          description: Webhook 目標 URL
          example: https://example.com
    DevToken:
      type: object
      description: '`get_dev_tokens` 回傳的 token 資訊 — 對應 TS `DevTokenDTO`。'
      required:
        - address
        - metadata
        - marketData
        - stats
      properties:
        address:
          type: string
          description: 代幣地址
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
        marketData:
          $ref: '#/components/schemas/TokenMarketData'
          description: 市場資料
        metadata:
          $ref: '#/components/schemas/TokenMetadata'
          description: 代幣元資料
        stats:
          $ref: '#/components/schemas/TokenStats'
          description: 交易統計
    Dex:
      type: object
      description: DEX 資訊
      required:
        - chain
      properties:
        chain:
          type: string
          description: 鏈識別符
          example: sol
        image:
          type:
            - string
            - 'null'
          description: DEX 圖片 URL
          example: https://example.com/dex-logo.png
        programAddress:
          type:
            - string
            - 'null'
          description: DEX 程式地址
          example: whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc
        protocolFamily:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexProtocolFamily'
              description: 協議家族名稱
    DexPool:
