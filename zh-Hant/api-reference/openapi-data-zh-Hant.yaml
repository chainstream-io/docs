          type:
            - string
            - 'null'
          description: 建立區塊時間戳
        feeRate:
          type:
            - string
            - 'null'
          description: 費率
        image:
          type:
            - string
            - 'null'
          description: 圖片 URL
        liquidityModel:
          type:
            - integer
            - 'null'
          format: int32
          description: 流動性模型
          minimum: 0
        poolAddress:
          type: string
          description: 池地址
        programAddress:
          type:
            - string
            - 'null'
          description: DEX 程式地址
        protocolFamily:
          type:
            - string
            - 'null'
          description: 協議家族
        protocolName:
          type:
            - string
            - 'null'
          description: 協議名稱
        tickSpacing:
          type:
            - integer
            - 'null'
          format: int64
          description: Tick 間距
        tokenAAddress:
          type: string
          description: Token A 地址
        tokenALiquidity:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DexPoolTokenLiquidity'
              description: Token A 流動性
        tokenBAddress:
          type: string
